workflow:
  max_repair_attempts: 2

nodes:
  resume_parsing:
    min_text_chars: 40
    min_populated_fields: 2
  job_discovery:
    max_jobs: 120
    min_job_count: 1
    max_discovery_retries: 1
  job_parsing: {}
  job_scoring:
    min_match_score: 0
    top_k: 0
    max_per_company: 0
  resume_generation:
    min_resume_bytes: 180
    max_bullet_rewrites: 2
  ats_evaluation: {}
  tile_construction:
    min_summary_chars: 30

resume_parsing:
  skill_keywords:
    - python
    - fastapi
    - django
    - flask
    - sql
    - postgres
    - mysql
    - kubernetes
    - docker
    - aws
    - gcp
    - azure
    - langgraph
    - machine-learning
    - llm
    - prompt-engineering
    - airflow
    - redis
    - kafka
  technology_keywords:
    - python
    - langgraph
    - langchain
    - fastapi
    - react
    - typescript
    - docker
    - kubernetes
    - aws
    - gcp
    - terraform
    - postgresql
    - redis
    - kafka
    - pytorch
    - scikit-learn
  role_keywords:
    - Software Engineer
    - Platform Engineer
    - Machine Learning Engineer
    - Applied AI Engineer
    - Backend Engineer
    - Data Engineer
    - Technical Lead

job_discovery:
  fetch_timeout_seconds: 4.0
  max_jobs_per_company: 0
  global_budget_seconds: 0
  location_preferences:
    enabled: true
    allowed_work_types: ["remote", "hybrid"]
    metro: "dfw"
    dfw_center: [32.8998, -97.0403]
    dfw_radius_miles: 45
    registry_path: "app/config/location_registry.json"
    geocode_cache_path: "var/location_geocode_cache.json"
    unknown_queue_path: "var/location_unknown_queue.json"
    location_hints:
      ["dallas", "fort worth", "plano", "richardson", "arlington", "hurst", "dfw"]
  companies:
    - name: "Stripe"
      careers_url: "https://careers.stripe.com/jobs"
      default_location: "United States"
      default_work_type: "hybrid"
      job_link_keywords: ["job", "position", "opening", "stripe.com/jobs"]
    - name: "Cloudflare"
      careers_url: "https://jobs.cloudflare.com/"
      default_location: "United States"
      default_work_type: "hybrid"
      job_link_keywords: ["job", "position", "opening", "cloudflare.com"]
